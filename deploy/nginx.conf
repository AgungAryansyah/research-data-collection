# Replace domain and Tailscale IP

server {
    listen 80;
    server_name research.yourdomain.com;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name research.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/research.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/research.yourdomain.com/privkey.pem;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 0;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass http://<beefy-tailscale-ip>:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
