<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .dash-container { max-width: 960px; margin: 0 auto; padding: 48px 24px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #d4c9b8; font-size: 14px; }
    th { font-weight: 600; color: #8b7355; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
    td { color: #5c4d3c; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .actions a { font-size: 13px; color: #4a5d4a; text-decoration: none; }
    .actions a:hover { text-decoration: underline; }
    .usage-bar { background: #d4c9b8; height: 12px; border-radius: 6px; margin: 12px 0 24px; overflow: hidden; }
    .usage-fill { background: #4a5d4a; height: 100%; border-radius: 6px; transition: width 0.3s; }
    .section { margin-bottom: 48px; }
    textarea { width: 100%; padding: 10px 14px; font-family: inherit; font-size: 14px; border: 2px solid #d4c9b8; border-radius: 4px; background: #fff; color: #5c4d3c; resize: vertical; min-height: 100px; }
    textarea:focus { outline: none; border-color: #8b7355; }
    .logout-btn { float: right; margin-top: -44px; }
  </style>
</head>
<body>
  <div class="dash-container">
    <h1>Admin Dashboard <button id="logout-btn" class="btn-outline logout-btn" style="padding:8px 16px;font-size:13px;">Logout</button></h1>

    <section id="login-section" class="section">
      <h2>Login</h2>
      <form id="login-form">
        <div class="field"><label for="user">Username</label><input type="text" id="user" name="user" required></div>
        <div class="field"><label for="pass">Password</label><input type="password" id="pass" name="pass" required></div>
        <button type="submit" class="btn-primary">Login</button>
      </form>
      <div id="login-error"></div>
    </section>

    <section id="dashboard-section" class="hidden">
      <section id="config-section" class="section">
        <h2>Configuration</h2>
        <form id="config-form">
          <div class="field"><label for="cfg-chunk">Chunk Duration (ms)</label><input type="number" id="cfg-chunk" name="chunkDurationMs" required></div>
          <div class="field"><label for="cfg-bitrate">Video Bitrate (bps)</label><input type="number" id="cfg-bitrate" name="videoBitrate" required></div>
          <div class="field"><label for="cfg-maxw">Max Width</label><input type="number" id="cfg-maxw" name="maxWidth" required></div>
          <div class="field"><label for="cfg-maxh">Max Height</label><input type="number" id="cfg-maxh" name="maxHeight" required></div>
          <div class="field"><label for="cfg-storage">Storage Path</label><input type="text" id="cfg-storage" name="storagePath" required></div>
          <div class="field"><label for="cfg-adminuser">Admin Username</label><input type="text" id="cfg-adminuser" name="adminUser" required></div>
          <div class="field"><label for="cfg-adminpass">Admin Password</label><input type="password" id="cfg-adminpass" name="adminPass" placeholder="leave blank to keep current" autocomplete="new-password"></div>
          <div class="field"><label for="cfg-fields">Info Fields (one per line)</label><textarea id="cfg-fields" name="infoFields" required></textarea></div>
          <div class="field" style="flex-direction:row;align-items:center;gap:12px;">
            <input type="checkbox" id="cfg-audio" name="audioEnabled" value="true" style="width:auto;">
            <label for="cfg-audio" style="margin:0;">Record Audio</label>
          </div>
          <button type="submit" class="btn-primary">Save Config</button>
        </form>
        <div id="config-status"></div>
      </section>

      <section id="sessions-section" class="section">
        <h2>Sessions</h2>
        <div id="usage-summary" style="margin-bottom:12px;font-size:14px;color:#8b7355;"></div>
        <div class="usage-bar"><div id="usage-fill" class="usage-fill" style="width:0%"></div></div>

        <section id="connections-section" class="section" style="margin-bottom:32px;">
          <h2>Active Connections</h2>
          <table id="connections-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Session ID</th>
                <th>Take</th>
                <th>Client IP</th>
                <th>Connected</th>
                <th>Data Sent</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <h2>Recorded Sessions</h2>
        <table id="sessions-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Session ID</th>
              <th>Created</th>
              <th>Takes</th>
              <th>Size</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </section>
  </div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
